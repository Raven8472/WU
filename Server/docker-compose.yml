services:
  wu-api:
    build:
      context: .
      dockerfile: src/WU.Api/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      WuPersistence__Postgres__ConnectionString: Host=postgres;Port=5432;Database=${POSTGRES_DB:-wu_persistence};Username=${POSTGRES_USER:-wu};Password=${POSTGRES_PASSWORD:-wu_dev_password}
      WuPersistence__Redis__ConnectionString: redis:6379
      WuPersistence__Realm__Slug: ${WU_REALM_SLUG:-local-dev}
      WuPersistence__Realm__DisplayName: ${WU_REALM_DISPLAY_NAME:-Local Dev}
    ports:
      - "5080:8080"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wu_persistence}
      POSTGRES_USER: ${POSTGRES_USER:-wu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wu_dev_password}
    ports:
      - "5433:5432"
    volumes:
      - wu-postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - wu-redis-data:/data

volumes:
  wu-postgres-data:
  wu-redis-data:
